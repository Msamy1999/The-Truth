<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="The Straight Path app icon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#12655B" />
      <stop offset="1" stop-color="#0B4A42" />
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)" />
  <!-- Three wandering paths converging into one straight path -->
  <path d="M10 16 C 19 16, 23.5 30.5, 31 31.7" stroke="#F4EDE1" stroke-width="3.6" stroke-linecap="round" opacity="0.5" />
  <path d="M10 32 C 15.5 28, 20 36, 31 32" stroke="#F4EDE1" stroke-width="3.6" stroke-linecap="round" opacity="0.7" />
  <path d="M10 48 C 19 48, 23.5 33.5, 31 32.3" stroke="#F4EDE1" stroke-width="3.6" stroke-linecap="round" opacity="0.5" />
  <!-- The one straight path -->
  <path d="M31.5 32 L49 32" stroke="#FFFFFF" stroke-width="5.2" stroke-linecap="round" />
  <!-- Destination point -->
  <circle cx="54.5" cy="32" r="3" fill="#C8951E" />
</svg>
