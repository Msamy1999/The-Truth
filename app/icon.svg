<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="The Straight Path app icon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#12655B" />
      <stop offset="1" stop-color="#0B4A42" />
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)" />
  <!-- The white light at the end of the road, with a warm glow -->
  <circle cx="32" cy="17.5" r="10.5" fill="#E7B94A" opacity="0.22" />
  <circle cx="32" cy="17.5" r="6.6" fill="#E7B94A" opacity="0.4" />
  <circle cx="32" cy="17.5" r="4" fill="#FFFFFF" />
  <!-- The straight road, in perspective, open at the horizon -->
  <path d="M17 55 L27.6 28" stroke="#F4EDE1" stroke-width="4.2" stroke-linecap="round" />
  <path d="M47 55 L36.4 28" stroke="#F4EDE1" stroke-width="4.2" stroke-linecap="round" />
  <!-- Center line receding toward the light -->
  <path d="M32 52.5 L32 47.5" stroke="#F4EDE1" stroke-width="3" stroke-linecap="round" opacity="0.65" />
  <path d="M32 42.5 L32 38.3" stroke="#F4EDE1" stroke-width="2.5" stroke-linecap="round" opacity="0.65" />
  <path d="M32 33.8 L32 30.8" stroke="#F4EDE1" stroke-width="2" stroke-linecap="round" opacity="0.65" />
</svg>
